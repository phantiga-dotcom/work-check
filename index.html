<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Work Checker - Classic Blue Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f0f4f8; 
            color: #1e293b;
        }
        .card { 
            background: white; 
            border-radius: 1.25rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
        }
        .job-dot { 
            width: 10px; 
            height: 10px; 
            border-radius: 99px; 
            display: inline-block; 
            margin: 0 2px;
            transition: all 0.3s ease;
        }
        .job-ok { background-color: #3b82f6; box-shadow: 0 0 5px rgba(59, 130, 246, 0.5); }
        .job-miss { background-color: #e2e8f0; }
        
        /* สไตล์ตารางให้ดูซอฟต์ */
        thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        tr:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-8 rounded-[2rem] shadow-sm border border-blue-100">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold text-blue-900 tracking-tight">ระบบติดตามการส่งงาน</h1>
                <p class="text-blue-500 font-medium text-sm mt-1 uppercase tracking-widest">Student Progress Monitoring Tracking</p>
            </div>
            <div class="mt-4 md:mt-0 px-6 py-2 bg-blue-50 rounded-full border border-blue-100">
                <span id="updateTime" class="text-blue-600 font-bold text-sm italic"></span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card p-8 text-center border-t-4 border-blue-400">
                <p class="text-slate-400 text-xs font-bold uppercase mb-2">จำนวนนักศึกษา</p>
                <p id="totalS" class="text-5xl font-bold text-slate-800">-</p>
            </div>
            <div class="card p-8 text-center border-t-4 border-blue-600">
                <p class="text-blue-500 text-xs font-bold uppercase mb-2">ส่งครบถ้วน</p>
                <p id="perfectS" class="text-5xl font-bold text-blue-600">-</p>
            </div>
            <div class="card p-8 text-center border-t-4 border-rose-400">
                <p class="text-rose-500 text-xs font-bold uppercase mb-2">ยังค้างงาน</p>
                <p id="pendingS" class="text-5xl font-bold text-rose-500">-</p>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr>
                            <th class="px-8 py-5 text-[11px]">รหัสนักศึกษา</th>
                            <th class="px-8 py-5 text-[11px]">ชื่อ-นามสกุล</th>
                            <th class="px-8 py-5 text-[11px] text-center">ความคืบหน้า (1-10)</th>
                            <th class="px-8 py-5 text-[11px] text-center">งานที่ยังขาด</th>
                            <th class="px-8 py-5 text-[11px] text-center">สรุปผล</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-slate-100 bg-white">
                        <tr><td colspan="5" class="p-20 text-center text-slate-400 font-medium">กำลังเตรียมข้อมูลรูปแบบคลาสสิก...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";

        function isSent(val) {
            if (!val) return false;
            let v = val.toString().trim();
            return v.includes("ส่ง") && !v.includes("ไม่");
        }

        async function loadData() {
            try {
                const res = await fetch(`${API}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                let students = rows.slice(1).map(r => {
                    const id = r[0] || "";
                    const name = (r[1] || "") + " " + (r[2] || "");
                    const works = r.slice(3, 13);
                    const details = works.map((w, i) => ({ num: i + 1, status: isSent(w) }));
                    const doneCount = details.filter(d => d.status).length;
                    const missing = details.filter(d => !d.status).map(d => d.num);
                    return { id, name, doneCount, missing, details };
                }).filter(s => s.id && s.id.length >= 7);

                document.getElementById('totalS').innerText = students.length;
                document.getElementById('perfectS').innerText = students.filter(s => s.doneCount === 10).length;
                document.getElementById('pendingS').innerText = students.filter(s => s.doneCount < 10).length;

                document.getElementById('tbody').innerHTML = students.map(s => `
                    <tr>
                        <td class="px-8 py-5 font-mono font-bold text-blue-700">${s.id}</td>
                        <td class="px-8 py-5 font-semibold text-slate-700">${s.name}</td>
                        <td class="px-8 py-5 text-center">
                            <div class="flex justify-center items-center gap-1">
                                ${s.details.map(d => `<span class="job-dot ${d.status ? 'job-ok' : 'job-miss'}"></span>`).join('')}
                            </div>
                        </td>
                        <td class="px-8 py-5 text-center">
                            ${s.missing.length > 0 
                                ? `<span class="text-[11px] bg-rose-50 text-rose-600 px-2 py-1 rounded-md font-bold">ขาด: ${s.missing.join(', ')}</span>` 
                                : '<span class="text-[11px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold italic">เรียบร้อย</span>'}
                        </td>
                        <td class="px-8 py-5 text-center">
                            <span class="text-lg font-bold ${s.doneCount === 10 ? 'text-blue-600' : 'text-slate-400'}">${s.doneCount}/10</span>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        document.getElementById('updateTime').innerText = "Update: " + new Date().toLocaleDateString('th-TH');
        window.onload = loadData;
    </script>
</body>
</html>
