<title>ระบบเช็คการส่งงานอัตโนมัติ</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>body { font-family: 'Kanit', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-5xl mx-auto">
<header class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
<h1 class="text-xl font-bold text-indigo-600">ClassTracker v2.0 (Auto Sync)</h1>
<span id="updateTime" class="text-xs text-gray-400 italic">กำลังโหลด...</span>
</header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-indigo-500">
            <p class="text-gray-400 text-xs font-bold">นักเรียนทั้งหมด</p>
            <p id="totalS" class="text-3xl font-bold">-</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
            <p class="text-gray-400 text-xs font-bold">ส่งครบ 10 งาน</p>
            <p id="perfectS" class="text-3xl font-bold">-</p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border-l-4 border-orange-500">
            <input type="text" id="searchBox" placeholder="ค้นหารหัส/ชื่อ..." class="w-full mt-1 p-2 border rounded-lg text-sm" oninput="doSearch()">
        </div>
    </div>

    <div id="searchResult" class="hidden bg-indigo-50 p-6 rounded-2xl border border-indigo-100 mb-8 animate-pulse">
        <h2 id="stName" class="text-xl font-bold text-indigo-900 mb-4"></h2>
        <div id="stGrid" class="grid grid-cols-2 sm:grid-cols-5 gap-3"></div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border">
        <h3 class="font-bold mb-4 text-gray-500 text-sm italic">กราฟแสดงจำนวนคนส่งงานแต่ละชิ้น (Update Real-time)</h3>
        <div class="h-[300px]"><canvas id="myChart"></canvas></div>
    </div>
</div>

<script>
    const SHEET_URL = "[https://docs.google.com/spreadsheets/d/1pCXYp8EOpXOWe02uow3QKpJPvEfZxXEjorlXXvlOsOU/export?format=csv](https://docs.google.com/spreadsheets/d/1pCXYp8EOpXOWe02uow3QKpJPvEfZxXEjorlXXvlOsOU/export?format=csv)";
    let students = [];
    let chart = null;

    async function init() {
        try {
            const r = await fetch(SHEET_URL);
            const t = await r.text();
            const lines = t.split('\n').filter(l => l.trim() !== '');
            students = lines.slice(1).map(l => {
                const c = l.split(',').map(v => v.trim().replace(/"/g,''));
                return { id: c[0], name: c[1]+' '+c[2], jobs: c.slice(3) };
            });
            document.getElementById('updateTime').innerText = "อัปเดต: " + new Date().toLocaleTimeString();
            render();
        } catch (e) { alert("เชื่อมต่อ Google Sheets ไม่ได้!"); }
    }

    function render() {
        document.getElementById('totalS').innerText = students.length;
        const isOk = (v) => v === 'ส่ง' || v === '1' || v === 'Y' || v === 'y';
        document.getElementById('perfectS').innerText = students.filter(s => s.jobs.every(isOk)).length;

        const jobCounts = Array(10).fill(0);
        students.forEach(s => s.jobs.forEach((v, i) => { if(isOk(v) && i < 10) jobCounts[i]++; }));

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('myChart'), {
            type: 'bar',
            data: {
                labels: ['งาน 1','งาน 2','งาน 3','งาน 4','งาน 5','งาน 6','งาน 7','งาน 8','งาน 9','งาน 10'],
                datasets: [{ label: 'จำนวนคนส่ง', data: jobCounts, backgroundColor: '#6366f1', borderRadius: 5 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    function doSearch() {
        const q = document.getElementById('searchBox').value.toLowerCase();
        const s = students.find(x => x.id.includes(q) || x.name.toLowerCase().includes(q));
        const box = document.getElementById('searchResult');
        const isOk = (v) => v === 'ส่ง' || v === '1' || v === 'Y' || v === 'y';
        
        if (q && s) {
            box.classList.remove('hidden', 'animate-pulse');
            document.getElementById('stName').innerText = "คุณ " + s.name + " (รหัส: " + s.id + ")";
            document.getElementById('stGrid').innerHTML = s.jobs.map((v, i) => `
                <div class="p-3 rounded-xl border text-center ${isOk(v) ? 'bg-green-100 border-green-200 text-green-700' : 'bg-red-50 border-red-100 text-red-400'}">
                    <div class="text-[10px] font-bold">งาน ${i+1}</div>
                    <div class="text-xs font-bold">${isOk(v) ? '✓ ส่งแล้ว' : '✗ ขาด'}</div>
                </div>
            `).join('');
        } else { box.classList.add('hidden'); }
    }
    window.onload = init;
</script>
</body>
</html>
