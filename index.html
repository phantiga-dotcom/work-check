<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker - Classic Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #f4f7fa; 
            color: #2d3748;
        }
        .main-container { max-width: 1100px; margin: auto; }
        
        /* สไตล์ตารางแบบ Minimal Luxury */
        .status-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        
        /* เลข 1-10 แบบใหม่ นุ่มนวลขึ้น */
        .num-badge {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .num-done { background: #eef2ff; color: #4338ca; border: 1px solid #e0e7ff; }
        .num-wait { background: #f8fafc; color: #cbd5e1; border: 1px solid #f1f5f9; }

        /* ปุ่ม Complete แบบหรู */
        .btn-complete {
            background: linear-gradient(135deg, #4338ca 0%, #3730a3 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            box-shadow: 0 4px 12px rgba(67, 56, 202, 0.2);
        }
        .btn-pending {
            background: #f1f5f9;
            color: #94a3b8;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="py-12 px-4">
    <div class="main-container space-y-10">
        
        <div class="flex flex-col md:flex-row justify-between items-center px-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-bold text-slate-800 tracking-tight">Assignment Monitoring</h1>
                <p class="text-slate-400 font-light text-sm mt-1 tracking-widest uppercase">Classroom Progress Tracking System</p>
            </div>
            <div class="mt-6 md:mt-0 flex gap-8 items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div class="text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Total Students</p>
                    <p id="totalS" class="text-3xl font-bold text-slate-800">-</p>
                </div>
                <div class="h-8 w-px bg-slate-100"></div>
                <div class="text-center">
                    <p class="text-[10px] text-indigo-500 font-bold uppercase tracking-widest mb-1">Complete</p>
                    <p id="perfectS" class="text-3xl font-bold text-indigo-600">-</p>
                </div>
            </div>
        </div>

        <div class="status-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50/50">
                        <tr class="text-slate-400 text-[11px] font-bold uppercase tracking-[0.15em]">
                            <th class="px-10 py-6 font-semibold">Student ID</th>
                            <th class="px-10 py-6 font-semibold">Full Name</th>
                            <th class="px-10 py-6 text-center font-semibold">Job Status (1-10)</th>
                            <th class="px-10 py-6 text-center font-semibold">Summary</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-slate-50">
                        <tr><td colspan="4" class="p-24 text-center text-slate-300 italic font-light">กำลังปรับแต่งความสวยงาม...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p class="text-center text-slate-400 text-[10px] font-medium tracking-[0.2em] uppercase">
            Updated on <span id="syncDate" class="text-indigo-400"></span>
        </p>
    </div>

    <script>
        const API = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";

        function checkStatus(val) {
            if (!val) return false;
            let v = val.toString().trim();
            return v.includes("ส่ง") && !v.includes("ไม่");
        }

        async function init() {
            try {
                const res = await fetch(`${API}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                let students = rows.slice(1).map(r => {
                    const id = r[0] || "";
                    const name = (r[1] || "") + " " + (r[2] || "");
                    const works = r.slice(3, 13);
                    const status = works.map((w, i) => ({ n: i + 1, done: checkStatus(w) }));
                    const totalDone = status.filter(s => s.done).length;
                    return { id, name, totalDone, status };
                }).filter(s => s.id && s.id.length >= 7);

                document.getElementById('totalS').innerText = students.length;
                document.getElementById('perfectS').innerText = students.filter(s => s.totalDone === 10).length;

                document.getElementById('tbody').innerHTML = students.map(s => `
                    <tr class="hover:bg-slate-50/80 transition-all duration-300">
                        <td class="px-10 py-6 text-xs font-semibold text-indigo-400/80 tracking-wider">${s.id}</td>
                        <td class="px-10 py-6 font-medium text-slate-700 text-sm">${s.name}</td>
                        <td class="px-10 py-6">
                            <div class="flex justify-center gap-2">
                                ${s.status.map(j => `
                                    <div class="num-badge ${j.done ? 'num-done' : 'num-wait'}">
                                        ${j.n}
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                        <td class="px-10 py-6 text-center">
                            <span class="${s.totalDone === 10 ? 'btn-complete' : 'btn-pending'} uppercase">
                                ${s.totalDone === 10 ? 'COMPLETE' : s.totalDone + ' / 10'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        document.getElementById('syncDate').innerText = new Date().toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
        window.onload = init;
    </script>
</body>
</html>
