<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบเช็คงานนักเรียน Live Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Kanit', sans-serif; background: #f8fafc; }
.glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
.stat-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
.stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
</style>
</head>
<body class="bg-slate-50 min-h-screen">

<nav class="bg-indigo-700 text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-2">
            <div class="bg-white p-2 rounded-lg">
                <svg class="w-6 h-6 text-indigo-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            </div>
            <h1 class="text-xl font-bold">ClassTracker <span class="text-indigo-200 font-light">Pro</span></h1>
        </div>
        <div class="relative w-full md:w-96">
            <input type="text" id="search" oninput="doSearch()" placeholder="🔍 ค้นหารหัส หรือ ชื่อนักเรียน..." 
                class="w-full pl-10 pr-4 py-2 rounded-xl bg-indigo-800 border-none text-white placeholder-indigo-300 focus:ring-2 focus:ring-yellow-400 outline-none shadow-inner">
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto p-4 md:p-6">
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="stat-card bg-white p-6 rounded-2xl flex items-center gap-4">
            <div class="bg-blue-100 p-4 rounded-xl text-blue-600"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a7 7 0 00-7 7v1h11v-1a7 7 0 00-7-7z"></path></svg></div>
            <div>
                <p class="text-sm text-slate-500 font-bold uppercase tracking-wider">นักเรียน</p>
                <p id="totalS" class="text-3xl font-bold text-slate-800">-</p>
            </div>
        </div>
        <div class="stat-card bg-white p-6 rounded-2xl flex items-center gap-4 border-l-8 border-emerald-500">
            <div class="bg-emerald-100 p-4 rounded-xl text-emerald-600"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg></div>
            <div>
                <p class="text-sm text-slate-500 font-bold uppercase tracking-wider">ส่งครบ 10 งาน</p>
                <p id="perfectS" class="text-3xl font-bold text-slate-800">-</p>
            </div>
        </div>
        <div class="stat-card bg-indigo-900 p-6 rounded-2xl text-white">
            <p class="text-indigo-300 text-xs font-bold uppercase mb-2 italic">อัปเดตจาก Google Sheets ล่าสุด</p>
            <p id="timeS" class="text-xl font-bold text-yellow-400 tracking-wider">กำลังโหลดข้อมูล...</p>
            <p id="status" class="text-[10px] mt-2 opacity-60">Status: Connecting...</p>
        </div>
    </div>

    <div id="resBox" class="hidden glass card p-8 mb-8 border-2 border-indigo-100 shadow-2xl animate-pulse">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b pb-4 gap-4">
            <div class="text-center md:text-left">
                <h2 id="stName" class="text-2xl font-bold text-indigo-900 leading-tight"></h2>
                <p id="stId" class="text-indigo-500 font-medium"></p>
            </div>
            <div class="flex flex-col items-center">
                <span id="stPercent" class="text-3xl font-black text-indigo-600">0%</span>
                <span class="text-[10px] text-slate-400 uppercase font-bold">Progress</span>
            </div>
        </div>
        <div id="stGrid" class="grid grid-cols-2 sm:grid-cols-5 md:grid-cols-10 gap-3"></div>
    </div>

    <div class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100">
        <div class="flex items-center gap-2 mb-8 justify-center md:justify-start">
            <div class="w-2 h-8 bg-indigo-600 rounded-full"></div>
            <h3 class="font-bold text-slate-800 text-lg uppercase tracking-widest italic">สรุปสถิติคนส่งงานในแต่ละชิ้น</h3>
        </div>
        <div class="relative h-[400px] w-full">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

</main>

<script>
    // ลิงก์ที่พี่ Publish เป็น CSV เรียบร้อยแล้ว
    const URL = "[https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv](https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv)";

    let students = [];
    let chart = null;

    async function init() {
        try {
            const res = await fetch(URL);
            const text = await res.text();
            
            // แยกแถวข้อมูล (รองรับตัวคั่นคอมม่าและฟันหนูครอบข้อความ)
            const rows = text.split(/\r?\n/).filter(line => line.trim() !== '').map(row => {
                const m = row.match(/("([^"]*(?:""[^"]*)*)"|([^",\r\n]+)|(?<=,|^)(?=,|$))/g);
                return m ? m.map(v => v.replace(/^"|"$/g, '').replace(/""/g, '"').trim()) : [];
            });

            if (rows.length < 2) return;

            // แมพข้อมูล: คอลัมน์ 0=ID, 1=Prefix, 2=Name, 3-12=Jobs
            students = rows.slice(1).map(r => ({
                id: r[0],
                name: (r[1] || '') + (r[2] || ''),
                jobs: r.slice(3, 13)
            }));

            document.getElementById('status').innerText = "✓ Connected to Google Cloud Database";
            document.getElementById('timeS').innerText = new Date().toLocaleTimeString('th-TH') + " น.";
            
            render();
        } catch (err) {
            document.getElementById('status').innerText = "❌ Connection Failed";
            document.getElementById('timeS').innerText = "Error Loading";
        }
    }

    // เช็คคำว่า "ส่ง" จากชีทของพี่
    const isOk = (v) => v === "ส่ง" || v === "1" || v === "y" || v === "Y";

    function render() {
        const total = students.length;
        const perfect = students.filter(s => s.jobs.every(isOk)).length;

        document.getElementById('totalS').innerText = total;
        document.getElementById('perfectS').innerText = perfect;

        // นับจำนวนคนส่งงานในแต่ละชิ้น (งาน 1-10)
        const jobCounts = Array(10).fill(0);
        students.forEach(s => {
            s.jobs.forEach((v, i) => { if (isOk(v)) jobCounts[i]++; });
        });

        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();
        
        // ปรับแต่งกราฟใหม่ (สเกลสูงสุด 73-80)
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['ชิ้นที่ 1','ชิ้นที่ 2','ชิ้นที่ 3','ชิ้นที่ 4','ชิ้นที่ 5','ชิ้นที่ 6','ชิ้นที่ 7','ชิ้นที่ 8','ชิ้นที่ 9','ชิ้นที่ 10'],
                datasets: [{
                    label: 'จำนวนคนส่ง (คน)',
                    data: jobCounts,
                    backgroundColor: 'rgba(79, 70, 229, 0.8)',
                    borderColor: '#4f46e5',
                    borderWidth: 2,
                    borderRadius: 12,
                    hoverBackgroundColor: '#4338ca'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        suggestedMax: total + 2,
                        grid: { color: '#f1f5f9', borderDash: [5, 5] },
                        ticks: { stepSize: 10, color: '#94a3b8', font: { weight: 'bold' } }
                    },
                    x: { grid: { display: false }, ticks: { color: '#64748b' } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function doSearch() {
        const query = document.getElementById('search').value.toLowerCase().trim();
        const result = students.find(x => x.id.includes(query) || x.name.toLowerCase().includes(query));
        const box = document.getElementById('resBox');
        
        if (query && result) {
            box.classList.remove('hidden');
            document.getElementById('stName').innerText = result.name;
            document.getElementById('stId').innerText = "รหัสนักศึกษา: " + result.id;
            
            const doneCount = result.jobs.filter(isOk).length;
            document.getElementById('stPercent').innerText = (doneCount * 10) + "%";
            
            document.getElementById('stGrid').innerHTML = result.jobs.map((v, i) => `
                <div class="flex flex-col items-center p-3 rounded-2xl border-2 transition-all shadow-sm ${isOk(v) ? 'bg-emerald-50 border-emerald-100 text-emerald-600' : 'bg-rose-50 border-rose-100 text-rose-500 opacity-60'}">
                    <span class="text-[10px] font-bold uppercase mb-1">JOB ${i+1}</span>
                    <span class="text-xl font-bold">${isOk(v) ? '✓' : '✗'}</span>
                </div>`).join('');
        } else {
            box.classList.add('hidden');
        }
    }

    window.onload = init;
</script>
</body>
</html>
