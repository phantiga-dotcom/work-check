<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker - Gemini Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans Thai', sans-serif; 
            background-color: #ffffff; 
            color: #1f1f1f;
        }
        .main-container { max-width: 1200px; margin: auto; padding: 40px 20px; }
        
        /* สไตล์ตารางแบบ Gemini: เน้นความขาวสะอาดและเส้นบาง */
        .glass-card {
            background: #ffffff;
            border-radius: 32px;
            border: 1px solid #e3e3e3;
        }
        
        /* ขยายขนาดตัวเลข 1-10 ให้ชัดขึ้น */
        .num-badge {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 0.95rem; /* ใหญ่ขึ้น */
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .num-done { background: #e8f0fe; color: #1a73e8; }
        .num-wait { background: #f1f3f4; color: #bdc1c6; }

        /* ปุ่ม COMPLETE แบบแบนแต่ดูแพง (Flat Design) */
        .btn-complete {
            background: #1a73e8;
            color: white;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 13px; /* ใหญ่ขึ้น */
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .btn-pending {
            background: #f8f9fa;
            color: #70757a;
            padding: 8px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #dadce0;
        }
    </style>
</head>
<body>
    <div class="main-container space-y-12">
        
        <div class="flex flex-col md:flex-row justify-between items-end px-4">
            <div>
                <h1 class="text-5xl font-semibold text-gray-900 tracking-tight">Tracker</h1>
                <p class="text-gray-500 text-lg mt-2 font-light">ติดตามการส่งงานนักศึกษา</p>
            </div>
            <div class="mt-8 md:mt-0 flex gap-12 bg-[#f8f9fa] p-8 rounded-[2rem]">
                <div class="text-center">
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-2">Students</p>
                    <p id="totalS" class="text-4xl font-medium text-gray-900">-</p>
                </div>
                <div class="text-center">
                    <p class="text-xs text-blue-600 font-bold uppercase tracking-widest mb-2">Complete</p>
                    <p id="perfectS" class="text-4xl font-medium text-blue-600">-</p>
                </div>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-[#f8f9fa] border-b border-gray-100">
                        <tr class="text-gray-500 text-[13px] font-bold uppercase tracking-wider">
                            <th class="px-10 py-6">Student ID</th>
                            <th class="px-10 py-6">Full Name</th>
                            <th class="px-10 py-6 text-center">Progress (1-10)</th>
                            <th class="px-10 py-6 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-gray-100">
                        <tr><td colspan="4" class="p-32 text-center text-gray-400 text-xl font-light">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p class="text-center text-gray-400 text-xs font-medium tracking-widest uppercase">
            Synchronized at <span id="syncDate" class="text-gray-600"></span>
        </p>
    </div>

    <script>
        const API = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";

        function checkStatus(val) {
            if (!val) return false;
            let v = val.toString().trim();
            return v.includes("ส่ง") && !v.includes("ไม่");
        }

        async function init() {
            try {
                const res = await fetch(`${API}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                let students = rows.slice(1).map(r => {
                    const id = r[0] || "";
                    const name = (r[1] || "") + " " + (r[2] || "");
                    const works = r.slice(3, 13);
                    const status = works.map((w, i) => ({ n: i + 1, done: checkStatus(w) }));
                    const totalDone = status.filter(s => s.done).length;
                    return { id, name, totalDone, status };
                }).filter(s => s.id && s.id.length >= 7);

                document.getElementById('totalS').innerText = students.length;
                document.getElementById('perfectS').innerText = students.filter(s => s.totalDone === 10).length;

                document.getElementById('tbody').innerHTML = students.map(s => `
                    <tr class="hover:bg-gray-50/50 transition-all duration-200">
                        <td class="px-10 py-8 text-sm font-semibold text-blue-600 tracking-tight">${s.id}</td>
                        <td class="px-10 py-8 font-medium text-gray-800 text-base">${s.name}</td>
                        <td class="px-10 py-8">
                            <div class="flex justify-center gap-2">
                                ${s.status.map(j => `
                                    <div class="num-badge ${j.done ? 'num-done' : 'num-wait'}">
                                        ${j.n}
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                        <td class="px-10 py-8 text-center">
                            <span class="${s.totalDone === 10 ? 'btn-complete' : 'btn-pending'}">
                                ${s.totalDone === 10 ? 'COMPLETE' : s.totalDone + ' / 10'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        document.getElementById('syncDate').innerText = new Date().toLocaleString('th-TH');
        window.onload = init;
    </script>
</body>
</html>
