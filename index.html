<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Class Monitoring Pro v21.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .progress-bg { background: rgba(255,255,255,0.1); border-radius: 99px; height: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease-out; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tight italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">WORK TRACKER v21.0</h1>
                <p class="text-slate-400 text-sm mt-1 uppercase tracking-widest font-bold">ระบบตรวจสอบ: แยก "ส่ง" ออกจาก "ไม่ส่ง" 100%</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-blue-400"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-8 border-b-4 border-blue-500">
                <p class="text-slate-400 text-xs font-bold uppercase mb-2">นักเรียนที่มีตัวตน (จริง)</p>
                <p id="totalS" class="text-6xl font-black">-</p>
            </div>
            <div class="glass-card p-8 border-b-4 border-emerald-500">
                <p class="text-emerald-400 text-xs font-bold uppercase mb-2">ส่งงานครบ (10/10)</p>
                <p id="perfectS" class="text-6xl font-black text-emerald-400">-</p>
            </div>
            <div class="glass-card p-8 border-b-4 border-rose-500">
                <p class="text-rose-400 text-xs font-bold uppercase mb-2">ยังค้างงาน</p>
                <p id="pendingS" class="text-6xl font-black text-rose-500">-</p>
            </div>
        </div>

        <div class="glass-card shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 text-slate-300 text-[10px] font-black uppercase tracking-widest">
                            <th class="px-8 py-6">ID STUDENT</th>
                            <th class="px-8 py-6">FULL NAME</th>
                            <th class="px-8 py-6">PROGRESS</th>
                            <th class="px-8 py-6 text-center">DONE</th>
                            <th class="px-8 py-6 text-center">STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-white/5 text-sm font-medium text-slate-200">
                        <tr><td colspan="5" class="p-20 text-center animate-pulse text-slate-500 font-bold">กำลังเชื่อมต่อฐานข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";

        // ✅ Logic คั้นน้ำ: ต้องมีคำว่า "ส่ง" แต่ต้องไม่มีคำว่า "ไม่"
        function isTrulySent(val) {
            if (!val) return false;
            let v = val.toString().trim();
            // ต้องเป็นคำว่า "ส่ง" หรือ "ส่งแล้ว" แต่ต้องไม่มีคำว่า "ไม่" นำหน้า
            return v.includes("ส่ง") && !v.includes("ไม่");
        }

        async function init() {
            try {
                const res = await fetch(`${API}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                let students = rows.slice(1).map(r => {
                    const id = r[0] || "";
                    const name = (r[1] || "") + " " + (r[2] || "");
                    const works = r.slice(3, 13);
                    const done = works.filter(isTrulySent).length;
                    return { id, name, done };
                })
                .filter(s => s.id && s.id.length >= 7); // ตัดแถวขยะออกเพื่อให้เหลือ 73 คน

                students.sort((a, b) => b.done - a.done);

                document.getElementById('totalS').innerText = students.length;
                document.getElementById('perfectS').innerText = students.filter(s => s.done === 10).length;
                document.getElementById('pendingS').innerText = students.filter(s => s.done < 10).length;

                document.getElementById('tbody').innerHTML = students.map(s => `
                    <tr class="hover:bg-white/[0.02] transition-colors">
                        <td class="px-8 py-5 font-mono text-blue-400">${s.id}</td>
                        <td class="px-8 py-5 font-bold">${s.name}</td>
                        <td class="px-8 py-5">
                            <div class="progress-bg"><div class="progress-fill ${s.done === 10 ? 'bg-emerald-500' : (s.done < 5 ? 'bg-rose-500' : 'bg-blue-500')}" style="width: ${s.done*10}%"></div></div>
                        </td>
                        <td class="px-8 py-5 text-center font-black text-lg">${s.done}/10</td>
                        <td class="px-8 py-5 text-center">
                            <span class="px-3 py-1 rounded-lg text-[10px] font-black ${s.done === 10 ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/50' : 'bg-rose-500/20 text-rose-400 border border-rose-500/50'} uppercase">
                                ${s.done === 10 ? 'PASSED' : 'INCOMPLETE'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH'); }, 1000);
        window.onload = init;
    </script>
</body>
</html>
