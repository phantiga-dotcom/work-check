<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Tracking - Advanced Filter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .tab-active { background-color: #4f46e5 !important; color: white !important; }
        .progress-bar { height: 8px; border-radius: 4px; background: #e2e8f0; overflow: hidden; }
        .progress-value { height: 100%; transition: width 0.5s; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <h2 class="text-2xl font-black text-slate-800 italic uppercase">Dashboard <span class="text-indigo-600">Filters</span></h2>
            <div class="flex flex-wrap gap-2" id="filterGroups">
                <button onclick="filterData('all')" class="px-4 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm hover:bg-slate-200 transition tab-active" id="btn-all">ทั้งหมด</button>
                <button onclick="filterData('perfect')" class="px-4 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm hover:bg-emerald-100" id="btn-perfect">ส่งครบ (10/10)</button>
                <button onclick="filterData('pending')" class="px-4 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm hover:bg-orange-100" id="btn-pending">ยังมีงานค้าง</button>
                <button onclick="filterData('critical')" class="px-4 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm hover:bg-rose-100 text-rose-600" id="btn-critical">กลุ่มวิกฤต (< 5)</button>
            </div>
        </div>

        <div class="relative">
            <input type="text" id="nameSearch" oninput="filterData(currentFilter)" placeholder="🔍 ค้นหาชื่อหรือรหัสร่วมกับเงื่อนไข..." 
                class="w-full p-4 pl-12 rounded-2xl border border-slate-200 shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none">
            <div class="absolute left-4 top-4 text-slate-400">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                        <tr>
                            <th class="px-6 py-4">รหัสนักศึกษา</th>
                            <th class="px-6 py-4">ชื่อ-นามสกุล</th>
                            <th class="px-6 py-4">ความคืบหน้า</th>
                            <th class="px-6 py-4 text-center">ส่งแล้ว</th>
                            <th class="px-6 py-4">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";
        let rawData = [];
        let currentFilter = 'all';

        const checkWork = (v) => v && v.trim() !== "" && v !== "0" && v !== "-" && !v.includes("ยังไม่");

        async function init() {
            const res = await fetch(`${API_URL}&t=${Date.now()}`);
            const text = await res.text();
            const rows = text.split(/\r?\n/).map(r => r.split(',').map(v => v.replace(/^"|"$/g, '').trim()));
            
            rawData = rows.slice(1).map(r => {
                const tasks = r.slice(3, 13);
                const count = tasks.filter(checkWork).length;
                return { id: r[0], name: r[1]+' '+r[2], count: count, percent: count * 10 };
            }).filter(s => s.id);

            filterData('all');
        }

        function filterData(type) {
            currentFilter = type;
            const searchQ = document.getElementById('nameSearch').value.toLowerCase();
            
            // จัดการปุ่ม Active
            document.querySelectorAll('#filterGroups button').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById('btn-' + type).classList.add('tab-active');

            let filtered = rawData;

            // เงื่อนไขการค้นหาตามประเภท (Filter Logic)
            if (type === 'perfect') filtered = rawData.filter(s => s.count === 10);
            if (type === 'pending') filtered = rawData.filter(s => s.count < 10);
            if (type === 'critical') filtered = rawData.filter(s => s.count < 5);

            // ค้นหาตามชื่อเพิ่ม (Search Logic)
            if (searchQ) {
                filtered = filtered.filter(s => s.id.includes(searchQ) || s.name.toLowerCase().includes(searchQ));
            }

            renderTable(filtered);
        }

        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            tbody.innerHTML = data.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4 font-mono text-sm">${s.id}</td>
                    <td class="px-6 py-4 font-bold text-slate-700">${s.name}</td>
                    <td class="px-6 py-4 w-48">
                        <div class="progress-bar">
                            <div class="progress-value ${s.count === 10 ? 'bg-emerald-500' : (s.count < 5 ? 'bg-rose-500' : 'bg-indigo-500')}" 
                                 style="width: ${s.percent}%"></div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center font-black">${s.count}/10</td>
                    <td class="px-6 py-4">
                        <span class="text-[10px] font-black px-2 py-1 rounded-md ${s.count === 10 ? 'bg-emerald-100 text-emerald-700' : (s.count < 5 ? 'bg-rose-100 text-rose-700' : 'bg-orange-100 text-orange-700')}">
                            ${s.count === 10 ? 'COMPLETE' : (s.count < 5 ? 'CRITICAL' : 'PENDING')}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
