<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Work Checker Pro v22.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1rem; }
        .job-dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; margin: 0 2px; }
        .job-ok { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        .job-miss { background-color: #ef4444; opacity: 0.3; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-end gap-4 glass p-6">
            <div>
                <h1 class="text-3xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">WORK TRACKER <span class="text-white text-xl ml-2">v22.0</span></h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">ตรวจสอบสถานะการส่งงานรายบุคคล (Job 1 - 10)</p>
            </div>
            <div class="text-right">
                <p id="totalCount" class="text-4xl font-black text-white">-</p>
                <p class="text-[10px] text-slate-500 font-bold uppercase">นักศึกษาทั้งหมด</p>
            </div>
        </div>

        <div class="glass overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 text-slate-400 text-[10px] font-black uppercase tracking-tighter">
                            <th class="px-6 py-5">รหัสนักศึกษา</th>
                            <th class="px-6 py-5">ชื่อ-นามสกุล</th>
                            <th class="px-6 py-5">สถานะงาน (1-10)</th>
                            <th class="px-6 py-5 text-center">ชิ้นที่ขาด</th>
                            <th class="px-6 py-5 text-center">รวม</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-white/5 text-sm font-medium">
                        <tr><td colspan="5" class="p-20 text-center text-slate-500 font-bold animate-pulse text-xl">กำลังดึงข้อมูลงานรายชิ้น...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";

        function isSent(val) {
            if (!val) return false;
            let v = val.toString().trim();
            return v.includes("ส่ง") && !v.includes("ไม่");
        }

        async function init() {
            try {
                const res = await fetch(`${API}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                let students = rows.slice(1).map(r => {
                    const id = r[0] || "";
                    const name = (r[1] || "") + " " + (r[2] || "");
                    const works = r.slice(3, 13); // Job 1 - 10
                    
                    // เก็บรายละเอียดว่างานไหนส่ง/ไม่ส่ง
                    const details = works.map((w, index) => ({
                        jobNum: index + 1,
                        status: isSent(w)
                    }));
                    
                    const doneCount = details.filter(d => d.status).length;
                    const missingJobs = details.filter(d => !d.status).map(d => d.jobNum);

                    return { id, name, details, doneCount, missingJobs };
                })
                .filter(s => s.id && s.id.length >= 7);

                document.getElementById('totalCount').innerText = students.length;

                document.getElementById('tbody').innerHTML = students.map(s => `
                    <tr class="hover:bg-white/[0.02] transition-colors">
                        <td class="px-6 py-4 font-mono text-cyan-400 font-bold">${s.id}</td>
                        <td class="px-6 py-4 font-bold text-slate-200">${s.name}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                ${s.details.map(d => `
                                    <div class="job-dot ${d.status ? 'job-ok' : 'job-miss'}" title="Job ${d.jobNum}: ${d.status ? 'ส่งแล้ว' : 'ยังไม่ส่ง'}"></div>
                                `).join('')}
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center text-[11px]">
                            ${s.missingJobs.length > 0 
                                ? `<span class="text-rose-400 font-bold">ขาดงาน: ${s.missingJobs.join(', ')}</span>` 
                                : '<span class="text-emerald-400 font-bold font-black italic">✓ ครบทุกงาน</span>'}
                        </td>
                        <td class="px-6 py-4 text-center">
                            <span class="text-lg font-black ${s.doneCount === 10 ? 'text-emerald-400' : 'text-slate-400'}">${s.doneCount}/10</span>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        window.onload = init;
    </script>
</body>
</html>
