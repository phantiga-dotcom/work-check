<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Student Tracker v20.0 - เฉพาะ ส่ง/ไม่ส่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="bg-indigo-950 p-6 rounded-2xl text-white shadow-xl flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic">TRACKER <span class="text-indigo-400">V20.0</span></h1>
                <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">Logic: นับเฉพาะคำว่า "ส่ง" | "ไม่ส่ง" ไม่นับ</p>
            </div>
            <div id="st" class="text-xs bg-emerald-500/20 px-3 py-1 rounded-full text-emerald-400">ONLINE</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-8 border-slate-300">
                <span class="text-[10px] font-bold text-slate-400 uppercase">นักศึกษาทั้งหมด</span>
                <p id="totalS" class="text-4xl font-black text-slate-800">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-8 border-emerald-500">
                <span class="text-[10px] font-bold text-emerald-500 uppercase">ส่งครบ 10 งาน</span>
                <p id="perfectS" class="text-4xl font-black text-emerald-600">-</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-8 border-rose-500">
                <span class="text-[10px] font-bold text-rose-500 uppercase">ยังค้างงาน</span>
                <p id="pendingS" class="text-4xl font-black text-rose-600">-</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-md overflow-hidden border border-slate-200">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-slate-300 text-[11px] font-black uppercase">
                    <tr>
                        <th class="px-6 py-4">รหัสนักศึกษา</th>
                        <th class="px-6 py-4">ชื่อ-นามสกุล</th>
                        <th class="px-6 py-4 text-center">ส่งจริง</th>
                        <th class="px-6 py-4">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y divide-slate-100 bg-white">
                    <tr><td colspan="4" class="p-20 text-center text-slate-400 font-bold animate-bounce">กำลังตรวจสอบคำว่า "ส่ง"...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";

        // ✅ Logic ตรงตัวที่สุด: ต้องมีคำว่า "ส่ง" ถึงจะนับ
        function isStrictSent(val) {
            if (!val) return false;
            let v = val.toString().trim();
            // ถ้าในช่องมีคำว่า "ส่ง" (เช่น ส่ง, ส่งแล้ว, ส่งงาน) ให้นับเป็น 1
            return v.includes("ส่ง"); 
        }

        async function init() {
            try {
                const res = await fetch(`${API}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                let students = rows.slice(1).map(r => {
                    const id = r[0] || "";
                    const name = (r[1] || "") + " " + (r[2] || "");
                    const works = r.slice(3, 13); // คอลัมน์ D ถึง M
                    const done = works.filter(isStrictSent).length; // นับเฉพาะคำว่า "ส่ง"
                    return { id, name, done };
                })
                // กรองเฉพาะคนที่มีรหัส (ตัดแถวขยะออก)
                .filter(s => s.id && s.id.length >= 7);

                students.sort((a, b) => b.done - a.done);

                document.getElementById('totalS').innerText = students.length;
                document.getElementById('perfectS').innerText = students.filter(s => s.done === 10).length;
                document.getElementById('pendingS').innerText = students.filter(s => s.done < 10).length;

                document.getElementById('tbody').innerHTML = students.map(s => `
                    <tr class="hover:bg-indigo-50/50">
                        <td class="px-6 py-4 font-mono font-bold text-indigo-600 text-sm">${s.id}</td>
                        <td class="px-6 py-4 font-bold text-slate-700">${s.name}</td>
                        <td class="px-6 py-4 text-center font-black text-xl text-slate-800">${s.done}/10</td>
                        <td class="px-6 py-4 text-xs font-bold ${s.done === 10 ? 'text-emerald-600' : 'text-rose-500'}">
                            ${s.done === 10 ? '✓ ส่งครบแล้ว' : '✗ ยังไม่ครบ'}
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        window.onload = init;
    </script>
</body>
</html>
