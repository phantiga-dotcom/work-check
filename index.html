<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Fixed Dashboard v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background: #f8fafc; }</style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-indigo-900 p-8 rounded-3xl text-white shadow-2xl">
            <h1 class="text-3xl font-black">STUDENT TRACKER <span class="text-indigo-400">V11.0</span></h1>
            <p class="opacity-70">ระบบตรวจสอบสถานะ (ตัดปัญหาข้อมูลขยะ 10/10)</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-slate-300">
                <p class="text-xs font-bold text-slate-400 uppercase">นักศึกษาทั้งหมด</p>
                <p id="totalS" class="text-4xl font-black text-slate-800">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-xs font-bold text-slate-400 uppercase">ส่งครบ (10 งาน)</p>
                <p id="perfectS" class="text-4xl font-black text-emerald-600">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-rose-500">
                <p class="text-xs font-bold text-slate-400 uppercase">ยังค้างงาน</p>
                <p id="pendingS" class="text-4xl font-black text-rose-600">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-amber-500">
                <p class="text-xs font-bold text-slate-400 uppercase">อัปเดตล่าสุด</p>
                <p id="timeS" class="text-xl font-bold text-slate-700 mt-2">-</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
            <div class="p-6 border-b bg-slate-50 flex flex-col md:flex-row justify-between gap-4">
                <h3 class="font-bold text-slate-700 text-lg italic">รายชื่อและสถานะความคืบหน้า</h3>
                <input type="text" id="q" oninput="draw()" placeholder="🔍 ค้นชื่อหรือรหัส..." class="p-2 border rounded-xl w-full md:w-80 outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <table class="w-full text-left">
                <thead class="bg-slate-100 text-slate-500 text-[11px] uppercase font-black">
                    <tr>
                        <th class="px-6 py-4">รหัส</th>
                        <th class="px-6 py-4">ชื่อ-นามสกุล</th>
                        <th class="px-6 py-4 text-center">ความคืบหน้า</th>
                        <th class="px-6 py-4 text-center">จำนวน</th>
                        <th class="px-6 py-4">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";
        let data = [];

        // 🛡️ ฟังก์ชันเช็ค "ส่งงาน" ที่เข้มงวดที่สุด
        function isSent(v) {
            if (!v) return false;
            let val = v.toString().trim();
            // ❌ สิ่งที่จะ "ไม่นับ" ว่าเป็นการส่งงาน:
            // ค่าว่าง, ขีด, เลข 0, 0.00, หรือข้อความที่แปลว่ายังไม่ส่ง
            const blackList = ["", "-", "0", "0.00", "ยังไม่ส่ง", "ค้าง", "null", "undefined"];
            if (blackList.includes(val)) return false;
            
            // ✅ ถ้ามีความยาวมากกว่า 0 และไม่อยู่ใน Blacklist ให้ถือว่าส่ง
            return val.length > 0;
        }

        async function load() {
            try {
                const r = await fetch(`${URL}&t=${Date.now()}`);
                const t = await r.text();
                const rows = t.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                data = rows.slice(1).map(r => {
                    const jobs = r.slice(3, 13);
                    const done = jobs.filter(isSent).length;
                    return { id: r[0], name: r[1] + ' ' + r[2], done: done };
                }).filter(s => s.id && s.id.length > 3); // กรองเอาเฉพาะที่มีรหัสนักศึกษาจริงๆ

                data.sort((a, b) => b.done - a.done);
                draw();
            } catch (e) { alert("ดึงข้อมูลไม่สำเร็จ"); }
        }

        function draw() {
            const q = document.getElementById('q').value.toLowerCase();
            const tbody = document.getElementById('tbody');
            
            const filtered = data.filter(s => s.id.includes(q) || s.name.toLowerCase().includes(q));
            
            document.getElementById('totalS').innerText = data.length;
            document.getElementById('perfectS').innerText = data.filter(s => s.done === 10).length;
            document.getElementById('pendingS').innerText = data.filter(s => s.done < 10).length;
            document.getElementById('timeS').innerText = new Date().toLocaleTimeString();

            tbody.innerHTML = filtered.map(s => `
                <tr class="hover:bg-slate-50">
                    <td class="px-6 py-4 font-mono text-xs">${s.id}</td>
                    <td class="px-6 py-4 font-bold text-slate-700">${s.name}</td>
                    <td class="px-6 py-4">
                        <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                            <div class="h-full ${s.done === 10 ? 'bg-emerald-500' : (s.done < 5 ? 'bg-rose-500' : 'bg-indigo-500')}" style="width:${s.done * 10}%"></div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center font-black text-lg">${s.done}/10</td>
                    <td class="px-6 py-4 text-[10px] font-bold ${s.done === 10 ? 'text-emerald-600' : 'text-rose-500'}">
                        ${s.done === 10 ? '✓ ครบ' : '✗ ยังไม่ครบ'}
                    </td>
                </tr>
            `).join('');
        }
        window.onload = load;
    </script>
</body>
</html>
