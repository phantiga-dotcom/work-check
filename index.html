<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามงานนักเรียน Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; color: #1f2937; }
        .glass-nav { background: rgba(30, 27, 75, 0.95); backdrop-filter: blur(8px); }
        .data-card { background: white; border-radius: 1.5rem; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e5e7eb; }
        .data-card:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        .badge-done { background-color: #dcfce7; color: #166534; }
        .badge-none { background-color: #fee2e2; color: #991b1b; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass-nav text-white p-4 md:p-6 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-indigo-500 p-2.5 rounded-2xl shadow-lg rotate-3">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold leading-none uppercase tracking-tight">Student <span class="text-indigo-400">Tracker</span></h1>
                    <p class="text-[10px] text-indigo-300 uppercase tracking-[0.2em] font-semibold mt-1">Version 10.0 Pro Max</p>
                </div>
            </div>
            
            <div class="relative w-full md:w-[500px]">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="search" oninput="doSearch()" 
                    class="w-full pl-12 pr-12 py-3.5 rounded-2xl bg-white/10 border border-white/20 text-white focus:bg-white focus:text-indigo-900 focus:ring-4 focus:ring-indigo-500/30 outline-none transition-all placeholder-white/40 shadow-inner"
                    placeholder="ค้นหาด้วยชื่อ หรือ รหัสนักศึกษา...">
                <button onclick="clearSearch()" class="absolute inset-y-0 right-0 pr-4 flex items-center text-white/30 hover:text-white">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 001.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="data-card p-6 border-l-8 border-indigo-600">
                <p class="text-slate-400 text-[11px] font-bold uppercase tracking-wider mb-2">จำนวนนักเรียน</p>
                <div class="flex items-baseline gap-2">
                    <span id="totalS" class="text-4xl font-black text-slate-800">-</span>
                    <span class="text-slate-400 text-sm font-bold">คน</span>
                </div>
            </div>
            <div class="data-card p-6 border-l-8 border-emerald-500">
                <p class="text-emerald-500 text-[11px] font-bold uppercase tracking-wider mb-2">ส่งงานครบ (10/10)</p>
                <div class="flex items-baseline gap-2">
                    <span id="perfectS" class="text-4xl font-black text-emerald-600">-</span>
                    <span class="text-emerald-400 text-sm font-bold">คน</span>
                </div>
            </div>
            <div class="data-card p-6 border-l-8 border-orange-500">
                <p class="text-orange-500 text-[11px] font-bold uppercase tracking-wider mb-2">อัตราความสำเร็จ</p>
                <div class="flex items-baseline gap-2">
                    <span id="avgRate" class="text-4xl font-black text-orange-600">-</span>
                    <span class="text-orange-400 text-sm font-bold">%</span>
                </div>
            </div>
            <div class="data-card p-6 border-l-8 border-slate-300">
                <p class="text-slate-400 text-[11px] font-bold uppercase tracking-wider mb-2">อัปเดตล่าสุด</p>
                <p id="timeS" class="text-xl font-bold text-slate-700 leading-tight mt-2 italic">-</p>
            </div>
        </div>

        <div id="resBox" class="hidden">
            <div class="bg-indigo-900 p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                <div class="absolute -right-10 -bottom-10 opacity-10">
                    <svg class="w-64 h-64" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                </div>
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10 relative z-10">
                    <div>
                        <span class="px-4 py-1 bg-white/20 rounded-full text-[10px] font-bold uppercase">ข้อมูลรายบุคคล</span>
                        <h2 id="stName" class="text-4xl font-black mt-3"></h2>
                        <p id="stId" class="text-indigo-300 font-mono text-lg tracking-widest mt-1"></p>
                    </div>
                    <div class="bg-white/10 p-6 rounded-3xl border border-white/20 text-center backdrop-blur-md">
                        <p class="text-[10px] uppercase font-bold opacity-60">ส่งงานแล้ว</p>
                        <p id="stCount" class="text-5xl font-black text-yellow-400"></p>
                    </div>
                </div>
                <div id="stGrid" class="grid grid-cols-2 sm:grid-cols-5 md:grid-cols-10 gap-3 relative z-10"></div>
            </div>
        </div>

        <div class="data-card p-6 md:p-10">
            <h3 class="font-bold text-slate-800 text-lg mb-8 italic flex items-center gap-2">
                <span class="w-1.5 h-6 bg-indigo-600 rounded-full"></span>
                สถิติจำนวนคนส่งงานแต่ละใบงาน (เป้าหมาย 73 คน)
            </h3>
            <div class="h-[400px] w-full">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div class="data-card overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 italic">รายชื่อและสถานะการส่งงานทั้งหมด</h3>
                <span class="text-xs text-slate-400 font-bold uppercase">เลื่อนเพื่อดูทั้งหมด</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[11px] uppercase text-slate-400">
                        <tr>
                            <th class="px-8 py-5 font-bold">รหัสนักศึกษา</th>
                            <th class="px-8 py-5 font-bold">ชื่อ-นามสกุล</th>
                            <th class="px-8 py-5 font-bold text-center">ส่งงาน (ชิ้น)</th>
                            <th class="px-8 py-5 font-bold text-right">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="fullTable" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";
        let students = [];
        let chart = null;

        const isValid = (v) => v && v.trim() !== "" && v !== "0" && v !== "-" && !v.includes("ยังไม่");

        async function init() {
            try {
                const res = await fetch(`${SHEET_URL}&nocache=${Date.now()}`);
                const text = await res.text();
                const delimiter = text.split('\n')[0].includes(';') ? ';' : ',';
                const rows = text.split(/\r?\n/).filter(l => l.trim() !== '').map(row => {
                    return row.split(delimiter).map(v => v.replace(/^"|"$/g, '').trim());
                });

                students = rows.slice(1).map(r => ({
                    id: r[0] || 'N/A',
                    name: (r[1] || '') + ' ' + (r[2] || ''),
                    jobs: r.slice(3, 13)
                }));

                updateUI();
                renderFullTable();
            } catch (err) { console.error("Data Load Error:", err); }
        }

        function updateUI() {
            const total = students.length;
            const perfect = students.filter(s => s.jobs.every(isValid)).length;
            let doneCount = 0;
            students.forEach(s => doneCount += s.jobs.filter(isValid).length);

            document.getElementById('totalS').innerText = total;
            document.getElementById('perfectS').innerText = perfect;
            document.getElementById('avgRate').innerText = ((doneCount / (total * 10)) * 100).toFixed(1);
            document.getElementById('timeS').innerText = new Date().toLocaleTimeString('th-TH') + " น.";

            const stats = Array(10).fill(0);
            students.forEach(s => s.jobs.forEach((v, i) => { if (isValid(v)) stats[i]++; }));
            renderChart(stats);
        }

        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['งาน 1','งาน 2','งาน 3','งาน 4','งาน 5','งาน 6','งาน 7','งาน 8','งาน 9','งาน 10'],
                    datasets: [{
                        label: 'จำนวนคนส่ง',
                        data: data,
                        backgroundColor: '#6366f1',
                        borderRadius: 12,
                        hoverBackgroundColor: '#4338ca'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, max: 80, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderFullTable() {
            const tbody = document.getElementById('fullTable');
            tbody.innerHTML = students.map(s => {
                const count = s.jobs.filter(isValid).length;
                return `
                    <tr class="hover:bg-indigo-50/50 transition-colors cursor-pointer" onclick="fillSearch('${s.id}')">
                        <td class="px-8 py-5 font-mono text-indigo-600 font-bold">${s.id}</td>
                        <td class="px-8 py-5 font-bold text-slate-700">${s.name}</td>
                        <td class="px-8 py-5 text-center">
                            <span class="font-black text-lg">${count}</span><span class="text-slate-400">/10</span>
                        </td>
                        <td class="px-8 py-5 text-right">
                            <span class="px-4 py-1.5 rounded-xl text-[10px] font-black ${count === 10 ? 'badge-done' : 'badge-none'}">
                                ${count === 10 ? 'COMPLETE ✓' : 'PENDING'}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function doSearch() {
            const q = document.getElementById('search').value.toLowerCase().trim();
            const s = students.find(x => x.id.includes(q) || x.name.toLowerCase().includes(q));
            const box = document.getElementById('resBox');
            if (q && s) {
                box.classList.remove('hidden');
                document.getElementById('stName').innerText = s.name;
                document.getElementById('stId').innerText = "รหัสนักศึกษา: " + s.id;
                const count = s.jobs.filter(isValid).length;
                document.getElementById('stCount').innerText = `${count}/10`;
                document.getElementById('stGrid').innerHTML = s.jobs.map((v, i) => `
                    <div class="p-4 rounded-2xl border-2 text-center transition-all ${isValid(v) ? 'bg-white/20 border-white/40 text-white' : 'bg-white/5 border-white/10 text-white/30'}">
                        <p class="text-[8px] font-bold uppercase mb-1">TASK ${i+1}</p>
                        <p class="text-2xl font-black">${isValid(v) ? '✓' : '✗'}</p>
                    </div>`).join('');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else { box.classList.add('hidden'); }
        }

        function fillSearch(id) {
            document.getElementById('search').value = id;
            doSearch();
        }

        function clearSearch() {
            document.getElementById('search').value = '';
            doSearch();
        }

        window.onload = init;
    </script>
</body>
</html>
