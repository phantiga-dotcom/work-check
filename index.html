<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Tracker - Smart Number Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'IBM Plex Sans Thai', sans-serif; background-color: #f8fafc; color: #334155; }
        .classic-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        
        /* สไตล์ตัวเลขสถานะ */
        .job-number {
            font-size: 0.85rem;
            font-weight: 700;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .is-done { color: #2563eb; background-color: #eff6ff; border: 1px solid #dbeafe; } /* ส่งแล้ว: เลขน้ำเงินชัดเจน */
        .is-pending { color: #cbd5e1; background-color: transparent; border: 1px solid #f1f5f9; } /* ยังไม่ส่ง: เลขเทาจาง */
        
        thead th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto space-y-8">
        
        <div class="bg-white p-10 rounded-[2rem] border border-blue-100 shadow-sm flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Student Assignment Tracker</h1>
                <p class="text-blue-500 font-medium text-sm mt-1 uppercase tracking-[0.2em]">ตรวจสอบสถานะการส่งงานรายชิ้น (1-10)</p>
            </div>
            <div class="mt-6 md:mt-0 flex gap-4">
                <div class="text-center px-6 border-r border-slate-100">
                    <p id="totalS" class="text-3xl font-bold text-slate-800">-</p>
                    <p class="text-[10px] text-slate-400 uppercase font-black">Students</p>
                </div>
                <div class="text-center px-6">
                    <p id="perfectS" class="text-3xl font-bold text-blue-600">-</p>
                    <p class="text-[10px] text-blue-400 uppercase font-black">Completed</p>
                </div>
            </div>
        </div>

        <div class="classic-card overflow-hidden border-none shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr>
                            <th class="px-8 py-6">Student ID</th>
                            <th class="px-8 py-6">Full Name</th>
                            <th class="px-8 py-6 text-center">Work Status (Job 1 - 10)</th>
                            <th class="px-8 py-6 text-center">Summary</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-slate-50 bg-white text-sm">
                        <tr><td colspan="4" class="p-20 text-center text-slate-400">กำลังประมวลผลรูปแบบตัวเลข...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <p class="text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest">
            Last Sync: <span id="syncDate"></span>
        </p>
    </div>

    <script>
        const API = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";

        function isSent(val) {
            if (!val) return false;
            let v = val.toString().trim();
            return v.includes("ส่ง") && !v.includes("ไม่");
        }

        async function fetchSmart() {
            try {
                const res = await fetch(`${API}&t=${Date.now()}`);
                const text = await res.text();
                const rows = text.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                let students = rows.slice(1).map(r => {
                    const id = r[0] || "";
                    const name = (r[1] || "") + " " + (r[2] || "");
                    const works = r.slice(3, 13);
                    const jobStatus = works.map((w, i) => ({ num: i + 1, done: isSent(w) }));
                    const count = jobStatus.filter(j => j.done).length;
                    return { id, name, count, jobStatus };
                }).filter(s => s.id && s.id.length >= 7);

                document.getElementById('totalS').innerText = students.length;
                document.getElementById('perfectS').innerText = students.filter(s => s.count === 10).length;

                document.getElementById('tbody').innerHTML = students.map(s => `
                    <tr class="hover:bg-blue-50/30 transition-colors">
                        <td class="px-8 py-5 font-mono font-semibold text-blue-700">${s.id}</td>
                        <td class="px-8 py-5 font-medium text-slate-700">${s.name}</td>
                        <td class="px-8 py-5">
                            <div class="flex justify-center gap-2">
                                ${s.jobStatus.map(j => `
                                    <div class="job-number ${j.done ? 'is-done' : 'is-pending'}">
                                        ${j.num}
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <span class="px-4 py-1.5 rounded-full text-xs font-bold ${s.count === 10 ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}">
                                ${s.count === 10 ? 'DONE' : s.count + ' / 10'}
                            </span>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        document.getElementById('syncDate').innerText = new Date().toLocaleString('th-TH');
        window.onload = fetchSmart;
    </script>
</body>
</html>
