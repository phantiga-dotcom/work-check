<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dashboard v12.0 - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background: #f1f5f9; }</style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="bg-indigo-950 p-6 rounded-3xl text-white shadow-xl flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic">STUDENT MONITOR <span class="text-yellow-400">V12.0</span></h1>
                <p class="text-xs opacity-60">โหมดแก้บั๊ก 10/10: ตรวจสอบเฉพาะรหัส 7 หลักขึ้นไป และค่าที่มากกว่า 0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-50 uppercase">Sync Status</p>
                <p id="timeS" class="text-sm font-bold text-green-400">Connecting...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-slate-400">
                <p class="text-xs font-bold text-slate-400 uppercase">รายชื่อที่พบ (ตัวตนจริง)</p>
                <p id="totalS" class="text-4xl font-black text-slate-800">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-emerald-500">
                <p class="text-xs font-bold text-slate-400 uppercase">ส่งครบจริง (10 งาน)</p>
                <p id="perfectS" class="text-4xl font-black text-emerald-600">-</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-rose-500">
                <p class="text-xs font-bold text-slate-400 uppercase">ยังค้างงาน (เสี่ยง)</p>
                <p id="pendingS" class="text-4xl font-black text-rose-600">-</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border flex gap-4">
            <input type="text" id="q" oninput="draw()" placeholder="🔍 พิมพ์ชื่อหรือรหัสเพื่อค้นหา..." class="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-slate-300 text-[11px] uppercase font-bold">
                    <tr>
                        <th class="px-6 py-4">รหัสนักศึกษา</th>
                        <th class="px-6 py-4">ชื่อ-นามสกุล</th>
                        <th class="px-6 py-4 text-center">ความคืบหน้า (10 ใบงาน)</th>
                        <th class="px-6 py-4 text-center">ส่งแล้ว</th>
                        <th class="px-6 py-4">ผลลัพธ์</th>
                    </tr>
                </thead>
                <tbody id="tbody" class="divide-y divide-slate-100">
                    <tr><td colspan="5" class="p-10 text-center text-slate-400">กำลังโหลดข้อมูลและคัดกรองแถวว่าง...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTu7wMeochYCSvxw1dAubtzBLF2SeMpIIA6rplVOH9ze_vbgyXpTllDJqRVnBAEa7ndTzow19nY5eJi/pub?gid=1009001526&output=csv";
        let students = [];

        // 🛡️ กรองขั้นเด็ดขาด: ต้องเป็นตัวเลขที่ไม่ใช่ 0 เท่านั้น
        function isValidWork(v) {
            if (!v) return false;
            let cleanV = v.toString().trim();
            if (cleanV === "" || cleanV === "-" || cleanV === "0" || cleanV === "0.00" || cleanV === "ยังไม่ส่ง") return false;
            
            // ถ้านำไปแปลงเป็นตัวเลขแล้วได้มากกว่า 0 ให้ผ่าน
            let num = parseFloat(cleanV);
            return !isNaN(num) && num > 0;
        }

        async function loadData() {
            try {
                const r = await fetch(`${URL}&t=${Date.now()}`);
                const t = await r.text();
                const rows = t.split(/\r?\n/).map(row => row.split(',').map(c => c.replace(/^"|"$/g, '').trim()));
                
                // กรองเฉพาะแถวที่มีรหัสนักศึกษาจริงๆ (สมมติว่ารหัสต้องมี 7 หลักขึ้นไป)
                students = rows.slice(1).map(r => {
                    const sid = r[0] ? r[0].trim() : "";
                    const jobs = r.slice(3, 13);
                    const doneCount = jobs.filter(isValidWork).length;
                    
                    return {
                        id: sid,
                        name: (r[1] || "") + " " + (r[2] || ""),
                        done: doneCount
                    };
                }).filter(s => s.id.length >= 7); // 👈 ตรงนี้จะตัด "แถวผี" ที่ทำให้กลายเป็น 100 คนออกไป

                students.sort((a, b) => b.done - a.done);
                draw();
            } catch (e) {
                document.getElementById('timeS').innerText = "Error!";
                console.error(e);
            }
        }

        function draw() {
            const q = document.getElementById('q').value.toLowerCase();
            const tbody = document.getElementById('tbody');
            
            const filtered = students.filter(s => s.id.includes(q) || s.name.toLowerCase().includes(q));
            
            document.getElementById('totalS').innerText = students.length;
            document.getElementById('perfectS').innerText = students.filter(s => s.done === 10).length;
            document.getElementById('pendingS').innerText = students.filter(s => s.done < 10).length;
            document.getElementById('timeS').innerText = "SUCCESS: " + new Date().toLocaleTimeString();

            tbody.innerHTML = filtered.map(s => `
                <tr class="hover:bg-indigo-50/50 transition-colors">
                    <td class="px-6 py-4 font-mono font-bold text-indigo-600">${s.id}</td>
                    <td class="px-6 py-4 font-bold text-slate-700">${s.name}</td>
                    <td class="px-6 py-4">
                        <div class="w-full bg-slate-200 h-3 rounded-full overflow-hidden shadow-inner">
                            <div class="h-full ${s.done === 10 ? 'bg-emerald-500' : (s.done < 5 ? 'bg-rose-500' : 'bg-amber-500')}" style="width:${s.done * 10}%"></div>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center font-black text-xl text-slate-800">${s.done}<span class="text-xs text-slate-400">/10</span></td>
                    <td class="px-6 py-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${s.done === 10 ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                            ${s.done === 10 ? 'Complete' : 'Pending'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
